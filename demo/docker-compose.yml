services:
  ez-demo:
    image: dvirbf/ez-demo:1.0.0
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      APP_ENV:     demo
      APP_VERSION: demo
    healthcheck:
      test:     ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 15s
      timeout:  3s
      retries:  3
    restart: unless-stopped
