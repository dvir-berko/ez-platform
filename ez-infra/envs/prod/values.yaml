# ── prod environment overrides ─────────────────────────────────────────────
# Image tag is updated by the promote-prod workflow on the explicit values file
image:
  tag: "prod-latest"  # updated by promote-prod with the selected staging-* tag

replicaCount: 3

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
  host: ""

env:
  APP_ENV: production

global:
  environment: prod
