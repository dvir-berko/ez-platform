# ─────────────────────────────────────────────────────────────────────────────
# ClusterSecretStore: aws-secrets-manager
#
# Apply this AFTER External Secrets Operator is installed and IRSA is configured.
# Required for Standard-tier services that pull secrets from AWS Secrets Manager.
#
# Pre-requisites:
#   1. ESO installed: helm install external-secrets external-secrets/external-secrets -n external-secrets-system --create-namespace
#   2. IRSA role created with SecretsManager:GetSecretValue permission
#   3. Replace <REGION> and <ESO_SA_NAMESPACE> with actual values
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1  # TODO: replace with your AWS region
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets-system
