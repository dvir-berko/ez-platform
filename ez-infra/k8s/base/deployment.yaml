# ─────────────────────────────────────────────────────────────────────────────
# EZ Platform — Base Kubernetes Deployment
#
# This is a raw (non-Helm) baseline manifest for any ez-platform service.
# Substitute "ez-service" with the real service name when onboarding.
# The image tag is updated automatically by CI via:
#   yq -i '.image.tag = "env-XXXXXXXX"' envs/{env}/values.yaml
#
# Security posture:
#   - runAsNonRoot + readOnlyRootFilesystem
#   - All Linux capabilities dropped
#   - maxUnavailable: 0 (zero-downtime rolling update)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  # Substitute with your service name
  name: ez-service
  labels:
    app.kubernetes.io/name: ez-service
    app.kubernetes.io/managed-by: argocd
    ez.platform/managed: "true"
  annotations:
    ez.platform/managed: "true"
    # Populated at deploy time by CI/CD
    ez.platform/commit-sha: "COMMIT_SHA_PLACEHOLDER"
spec:
  # Replica count is overridden per-environment via envs/{env}/values.yaml
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ez-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Zero downtime: never take a pod down before a new one is ready
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ez-service
        ez.platform/managed: "true"
      annotations:
        ez.platform/commit-sha: "COMMIT_SHA_PLACEHOLDER"
    spec:
      # ── Security context (pod-level) ──────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      # ── Service account ───────────────────────────────────────────────────
      serviceAccountName: ez-service

      # ── Containers ────────────────────────────────────────────────────────
      containers:
        - name: ez-service
          # Image tag is updated by CI:
          #   yq -i '.image.tag = "dev-abc12345"' envs/dev/values.yaml
          # IMAGE_PLACEHOLDER and TAG_PLACEHOLDER are substituted at deploy time.
          image: IMAGE_PLACEHOLDER:TAG_PLACEHOLDER
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          # ── Container security context ───────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]

          # ── Resource requests / limits ───────────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ── Health probes ─────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # ── Volume mounts ─────────────────────────────────────────────────
          volumeMounts:
            - name: tmp
              mountPath: /tmp

          # ── Environment variables ──────────────────────────────────────────
          envFrom:
            - secretRef:
                name: ez-platform-secrets
                optional: true

      # ── Volumes ───────────────────────────────────────────────────────────
      volumes:
        - name: tmp
          emptyDir: {}

      # ── Scheduling ────────────────────────────────────────────────────────
      terminationGracePeriodSeconds: 30
