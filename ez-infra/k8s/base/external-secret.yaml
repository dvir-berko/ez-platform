# ─────────────────────────────────────────────────────────────────────────────
# EZ Platform — ExternalSecret (External Secrets Operator v1beta1)
#
# Reads all keys from an AWS Secrets Manager path and syncs them into a
# Kubernetes Secret. The ClusterSecretStore "aws-secrets-manager" is assumed
# to be pre-installed (managed by the platform team).
#
# Substitute ENV_PLACEHOLDER with the actual environment (dev/staging/prod).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ez-platform-secrets
  labels:
    app.kubernetes.io/name: ez-service
    app.kubernetes.io/managed-by: argocd
    ez.platform/managed: "true"
spec:
  # Sync frequency — secrets are refreshed every hour
  refreshInterval: 1h

  # Reference the shared ClusterSecretStore (platform-managed)
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  # Target Kubernetes Secret to create/update
  target:
    name: ez-platform-secrets
    creationPolicy: Owner

  # Extract all keys from the Secrets Manager secret at the path.
  # Substitute ENV_PLACEHOLDER (e.g. dev, staging, prod) before applying.
  dataFrom:
    - extract:
        key: /ez-platform/ENV_PLACEHOLDER/
