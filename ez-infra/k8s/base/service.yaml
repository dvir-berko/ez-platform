# ─────────────────────────────────────────────────────────────────────────────
# EZ Platform — Base Service + ALB Ingress
#
# Two resources:
#   1. ClusterIP Service (port 80 → container 8080)
#   2. Ingress with AWS ALB Controller annotations (HTTPS-only)
#
# Substitute "ez-service" with the real service name and update the host.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: ez-service
  labels:
    app.kubernetes.io/name: ez-service
    app.kubernetes.io/managed-by: argocd
    ez.platform/managed: "true"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ez-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP

---
# ─────────────────────────────────────────────────────────────────────────────
# ALB Ingress — HTTPS-only, internet-facing
# Substitute SERVICE_NAME.your-domain.com with the actual hostname.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ez-service
  labels:
    app.kubernetes.io/name: ez-service
    app.kubernetes.io/managed-by: argocd
    ez.platform/managed: "true"
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
spec:
  rules:
    - host: SERVICE_NAME.your-domain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ez-service
                port:
                  number: 80
