app:
  baseUrl: ${APP_BASE_URL}

backend:
  baseUrl: ${BACKEND_BASE_URL}
  listen:
    port: 7007
  database:
    client: pg
    connection:
      host:     ${POSTGRES_HOST}
      port:     ${POSTGRES_PORT}
      user:     ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      database: ${POSTGRES_DB}
  cache:
    store: memcache
    connection: ${MEMCACHE_CONNECTION}

techdocs:
  builder: 'external'
  generator:
    runIn: 'local'
  publisher:
    type:            'awsS3'
    awsS3:
      bucketName:  ${TECHDOCS_S3_BUCKET}
      region:      ${AWS_REGION}
      accountId:   ${AWS_ACCOUNT_ID}

auth:
  environment: production
  providers:
    github:
      production:
        clientId:     ${AUTH_GITHUB_CLIENT_ID}
        clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
