# External Secrets Operator — pulls secrets from AWS Secrets Manager
# into Kubernetes secrets, without storing plaintext values in Git.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "ez.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ez.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name:  aws-secrets-manager  # ClusterSecretStore installed by platform team
    kind:  ClusterSecretStore
  target:
    name:          {{ include "ez.fullname" . }}-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key:      {{ .Values.secrets.awsSecretName }}
        property: database_url

    {{- if .Values.secrets.additionalKeys }}
    {{- range .Values.secrets.additionalKeys }}
    - secretKey: {{ .k8sKey }}
      remoteRef:
        key:      {{ $.Values.secrets.awsSecretName }}
        property: {{ .awsProperty }}
    {{- end }}
    {{- end }}
