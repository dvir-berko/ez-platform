# prod environment overrides
replicaCount: 3

autoscaling:
  enabled:     true
  minReplicas: 3
  maxReplicas: 20

resources:
  requests:
    cpu:    "200m"
    memory: "256Mi"
  limits:
    cpu:    "1000m"
    memory: "1Gi"

ingress:
  enabled:   true
  className: "nginx"
  host:      "${{ values.name }}.prod.internal"
  tls:
    - secretName: "${{ values.name }}-tls"
      hosts:
        - "${{ values.name }}.prod.internal"

env:
  APP_ENV: "production"
