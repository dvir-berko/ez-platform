{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ez.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ez.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ez.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    # Allow traffic from pods in the same namespace
    - from:
        - podSelector: {}
  egress:
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTPS and HTTP egress (external APIs, AWS services)
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
{{- end }}
