apiVersion: v1
kind: Service
metadata:
  name: {{ include "ez.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ez.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port:       {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol:   TCP
      name:       http
  selector:
    {{- include "ez.selectorLabels" . | nindent 4 }}
