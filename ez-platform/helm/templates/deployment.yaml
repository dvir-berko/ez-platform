apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ez-platform.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ez-platform.labels" . | nindent 4 }}
  annotations:
    ez.platform/commit-sha: {{ .Values.global.commitSha | default "unknown" | quote }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ez-platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ez-platform.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ez-platform.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: ez-platform
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: APP_BASE_URL
              value: {{ .Values.env.APP_BASE_URL | quote }}
            - name: BACKEND_BASE_URL
              value: {{ .Values.env.BACKEND_BASE_URL | quote }}
          {{- if .Values.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret }}
                optional: true
          {{- end }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /app/data
      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          emptyDir: {}
