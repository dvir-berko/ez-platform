# ────────────────────────────────────────────────────────────────────────────────
# EZ Platform — Reusable Promote-to-Production Workflow
#
# Purpose:
#   Manual promotion of a staging-tagged image to the production environment.
#   Requires a GitHub Environment "production" approval gate.
#
# Contract (inputs/outputs):
#   Inputs  : service-name, image-tag (must start with "staging-"), reason,
#             infra-repo (required), infra-repo-ref
#   Secrets : GH_APP_ID + GH_APP_PRIVATE_KEY (GitHub App with write access to
#             infra repo — short-lived token generated per run, no rotation needed),
#             SLACK_WEBHOOK_URL (optional)
#
# Steps:
#   1. Validate image tag starts with "staging-"
#   2. Generate short-lived GitHub App token scoped to infra repo
#   3. Clone infra repo, install yq v4, patch envs/prod/values.yaml
#   4. Commit and push [skip ci]
#   5. Slack notification (if webhook set)
#   6. Publish job summary
# ────────────────────────────────────────────────────────────────────────────────
name: EZ Promote to Production (Reusable)

on:
  workflow_call:
    inputs:
      service-name:
        description: "Name of the service being promoted"
        required: true
        type: string
      image-tag:
        description: "Image tag to promote (must start with 'staging-')"
        required: true
        type: string
      reason:
        description: "Reason for this promotion (recorded in commit message)"
        required: true
        type: string
      infra-repo:
        description: "GitOps infra repo (e.g. dvir-berko/infra)"
        required: true
        type: string
      infra-repo-ref:
        description: "Branch/ref of the infra repo to clone and push"
        required: false
        type: string
        default: "main"

    secrets:
      GH_APP_ID:
        description: "GitHub App ID with write access to the infra repo"
        required: true
      GH_APP_PRIVATE_KEY:
        description: "GitHub App private key (PEM format) for generating short-lived tokens"
        required: true
      SLACK_WEBHOOK_URL:
        description: "Slack incoming webhook URL for promotion notifications"
        required: false

jobs:
  promote:
    name: Promote to Production
    runs-on: ubuntu-latest
    # Triggers the GitHub Environment approval gate
    environment: production
    permissions:
      contents: read

    steps:
      # ── 1. Validate image tag format ────────────────────────────────────────
      - name: Validate image tag
        run: |
          TAG="${{ inputs.image-tag }}"
          if [[ "$TAG" != staging-* ]]; then
            echo "::error::image-tag must start with 'staging-' (got: '${TAG}')"
            echo "Only images built from the staging branch can be promoted to production."
            exit 1
          fi
          echo "Image tag validation passed: ${TAG}"

      # ── 2. Generate short-lived GitHub App token scoped to infra repo ─────────
      - name: Extract infra repo name
        id: infra-repo-name
        run: echo "name=${INFRA_REPO##*/}" >> "$GITHUB_OUTPUT"
        env:
          INFRA_REPO: ${{ inputs.infra-repo }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id:      ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner:       ${{ github.repository_owner }}
          repositories: ${{ steps.infra-repo-name.outputs.name }}

      # ── 3. Clone infra repo + install yq + patch prod values ────────────────
      - name: Patch prod image tag in infra repo
        env:
          INFRA_REPO: ${{ inputs.infra-repo }}
          INFRA_REF:  ${{ inputs.infra-repo-ref }}
          NEW_TAG:    ${{ inputs.image-tag }}
          SERVICE:    ${{ inputs.service-name }}
          REASON:     ${{ inputs.reason }}
          ACTOR:      ${{ github.actor }}
          GH_TOKEN:   ${{ steps.app-token.outputs.token }}
          GIT_AUTHOR_NAME:  "ez-platform[bot]"
          GIT_AUTHOR_EMAIL: "ez-platform[bot]@users.noreply.github.com"
        run: |
          # Install yq v4
          YQ_VERSION="v4.44.1"
          sudo wget -qO /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq

          # Clone infra repo using short-lived App token
          git clone \
            "https://x-access-token:${GH_TOKEN}@github.com/${INFRA_REPO}.git" \
            /tmp/infra-repo
          cd /tmp/infra-repo
          git checkout "$INFRA_REF"

          # Patch envs/prod/values.yaml
          VALUES_FILE="envs/prod/values.yaml"
          if [ ! -f "$VALUES_FILE" ]; then
            echo "::error::Production values file not found: $VALUES_FILE"
            exit 1
          fi
          yq -i ".image.tag = \"${NEW_TAG}\"" "$VALUES_FILE"

          # Commit and push
          git config user.name  "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git add "$VALUES_FILE"
          git commit -m "$(printf 'chore(cd): promote %s to prod → %s\n\nPromoted by: %s\nReason: %s\n[skip ci]' \
            "$SERVICE" "$NEW_TAG" "$ACTOR" "$REASON")"
          git push origin "$INFRA_REF"

      # ── 3. Slack notification ────────────────────────────────────────────────
      - name: Notify Slack — production promotion
        if: ${{ always() && secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook:      ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚀 Production promotion: ${{ inputs.service-name }} → ${{ inputs.image-tag }} by ${{ github.actor }}",
              "blocks": [
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Service:*\n${{ inputs.service-name }}" },
                    { "type": "mrkdwn", "text": "*Image Tag:*\n`${{ inputs.image-tag }}`" },
                    { "type": "mrkdwn", "text": "*Promoted by:*\n${{ github.actor }}" },
                    { "type": "mrkdwn", "text": "*Reason:*\n${{ inputs.reason }}" },
                    { "type": "mrkdwn", "text": "*Status:*\n${{ job.status == 'success' && '✅ Promoted' || '❌ Failed' }}" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }

      # ── 4. Publish job summary ───────────────────────────────────────────────
      - name: Publish promotion summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON="$([[ "$STATUS" == "success" ]] && echo "✅" || echo "❌")"
          echo "## ${ICON} Production Promotion — ${{ inputs.service-name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ----- | ----- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | \`${{ inputs.service-name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image Tag | \`${{ inputs.image-tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Promoted By | \`${{ github.actor }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Reason | ${{ inputs.reason }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Infra Repo | \`${{ inputs.infra-repo }}@${{ inputs.infra-repo-ref }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | ${STATUS} |" >> "$GITHUB_STEP_SUMMARY"
