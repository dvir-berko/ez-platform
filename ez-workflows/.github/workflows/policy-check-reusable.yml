# ────────────────────────────────────────────────────────────────────────────────
# EZ Platform — Reusable Policy Check Workflow
#
# Runs:
#   - helm lint
#   - helm template | conftest (OPA policies)
#   - Dockerfile lint (Hadolint)
#   - Secret scanning (Gitleaks)
#   - Dependency license check (optional)
# ────────────────────────────────────────────────────────────────────────────────
name: EZ Policy Check (Reusable)

on:
  workflow_call:
    inputs:
      helm-chart-path:
        description: "Path to Helm chart"
        required: false
        type: string
        default: "helm"
      policy-path:
        description: "Path to OPA/conftest policies"
        required: false
        type: string
        default: ".ez/policies"
      dockerfile-path:
        description: "Path to Dockerfile"
        required: false
        type: string
        default: "Dockerfile"
      helm-namespace:
        description: "Namespace to use for helm template rendering"
        required: false
        type: string
        default: "default"
      helm-release-name:
        description: "Release name for helm template rendering"
        required: false
        type: string
        default: "policy-check"
      fail-on-secret-detection:
        description: "Fail the job if secrets are detected by Gitleaks"
        required: false
        type: boolean
        default: true
      allow-tracked-sourcemaps:
        description: "Allow committed source maps in the repository"
        required: false
        type: boolean
        default: false

    outputs:
      policy-passed:
        description: "true if all checks passed, false otherwise"
        value: ${{ jobs.policy.outputs.policy-passed }}

jobs:
  policy:
    name: Policy & Governance Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    outputs:
      policy-passed: ${{ steps.summary.outputs.passed }}

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for gitleaks history scan

      # ── 2. Guard against exposed env / backup files ────────────────────────
      - name: Check forbidden tracked files
        id: forbidden-files
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import pathlib
          import re
          import subprocess
          import sys

          allow_sourcemaps = "${{ inputs.allow-tracked-sourcemaps }}".lower() == "true"
          tracked = subprocess.check_output(["git", "ls-files", "-z"], text=False).decode("utf-8", "replace").split("\0")
          tracked = [item for item in tracked if item]

          checks = [
              ("Tracked env files", re.compile(r"(^|/)\.env([._-][^/]+)?$"), {
                  ".env.example",
                  ".env.template",
                  ".env.sample",
              }),
              ("Backup and dump files", re.compile(r"(^|/).+\.(bak|old|backup|dump|sql|tar|tgz|gz|zip)$"), set()),
              ("Backup directories", re.compile(r"(^|/)(backup|backups|bak|old|dump)(/|$)"), set()),
          ]

          if not allow_sourcemaps:
              checks.append(("Tracked source maps", re.compile(r"(^|/).+\.map$"), set()))

          failures = []
          for label, pattern, allowlist in checks:
              matches = []
              for item in tracked:
                  basename = pathlib.Path(item).name
                  if basename in allowlist:
                      continue
                  if pattern.search(item):
                      matches.append(item)
              if matches:
                  failures.append((label, matches[:20]))

          if failures:
              for label, matches in failures:
                  print(f"{label} detected:")
                  for match in matches:
                      print(f"  - {match}")
              sys.exit(1)
          PY

      # ── 3. Helm lint ─────────────────────────────────────────────────────────
      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: "v3.14.0"

      - name: Helm lint
        id: helm-lint
        run: |
          if [ -d "${{ inputs.helm-chart-path }}" ]; then
            helm lint "${{ inputs.helm-chart-path }}" \
              --strict \
              --set "image.repository=placeholder" \
              --set "image.tag=latest"
          else
            echo "::notice::No Helm chart found at ${{ inputs.helm-chart-path }}, skipping"
          fi

      # ── 4. OPA / conftest policy check ──────────────────────────────────────
      - name: Install conftest
        run: |
          VERSION="0.48.0"
          curl -sL "https://github.com/open-policy-agent/conftest/releases/download/v${VERSION}/conftest_${VERSION}_Linux_x86_64.tar.gz" \
            | tar xz conftest
          sudo mv conftest /usr/local/bin/conftest

      - name: Render Helm templates
        if: ${{ hashFiles(inputs.helm-chart-path + '/Chart.yaml') != '' }}
        run: |
          helm template "${{ inputs.helm-release-name }}" "${{ inputs.helm-chart-path }}" \
            --namespace "${{ inputs.helm-namespace }}" \
            --set "image.repository=placeholder" \
            --set "image.tag=latest" \
            > /tmp/helm-rendered.yaml

      - name: Run conftest (OPA policies)
        if: ${{ hashFiles(inputs.policy-path + '/**/*.rego') != '' }}
        id: conftest
        run: |
          if [ -f "/tmp/helm-rendered.yaml" ]; then
            conftest test /tmp/helm-rendered.yaml \
              --policy "${{ inputs.policy-path }}" \
              --output table \
              --all-namespaces
          fi

      # ── 5. Dockerfile lint (Hadolint) ───────────────────────────────────────
      - name: Hadolint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        if: ${{ hashFiles(inputs.dockerfile-path) != '' }}
        with:
          dockerfile:      ${{ inputs.dockerfile-path }}
          format:          sarif
          output-file:     hadolint.sarif
          failure-threshold: warning

      - name: Upload Hadolint SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: hadolint.sarif
        continue-on-error: true

      # ── 6. Secret scanning (Gitleaks) ───────────────────────────────────────
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        id: gitleaks
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_ENABLE_COMMENTS: "true"
        continue-on-error: ${{ !inputs.fail-on-secret-detection }}

      # ── 7. SAST (Semgrep) ───────────────────────────────────────────────────
      - name: Set up Python for Semgrep
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: python3 -m pip install --disable-pip-version-check semgrep

      - name: Run Semgrep
        id: semgrep
        run: |
          semgrep scan \
            --config auto \
            --error \
            --sarif \
            --output semgrep.sarif

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

      # ── 8. Filesystem / IaC scan (Trivy) ────────────────────────────────────
      - name: Trivy filesystem scan
        id: trivy-fs
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          exit-code: "1"

      - name: Upload Trivy filesystem SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
        continue-on-error: true

      # ── 9. Required label / annotation checks ───────────────────────────────
      - name: Check required Helm annotations
        if: ${{ hashFiles(inputs.helm-chart-path + '/Chart.yaml') != '' }}
        run: |
          CHART="${{ inputs.helm-chart-path }}/Chart.yaml"
          MISSING=()

          # Check for required annotations
          grep -q "ez.platform/team" "$CHART"            || MISSING+=("ez.platform/team")
          grep -q "ez.platform/tier" "$CHART"            || MISSING+=("ez.platform/tier")
          grep -q "backstage.io/kubernetes-id" "$CHART"  || MISSING+=("backstage.io/kubernetes-id")

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required Chart.yaml annotations: ${MISSING[*]}"
            echo "::error::See https://ez.internal/docs/required-annotations"
            exit 1
          fi

      # ── 10. Summary ──────────────────────────────────────────────────────────
      - name: Publish policy summary
        id: summary
        if: always()
        run: |
          PASSED="true"
          [ "${{ steps.forbidden-files.outcome }}" == "failure" ] && PASSED="false"
          [ "${{ steps.helm-lint.outcome }}" == "failure" ] && PASSED="false"
          [ "${{ steps.conftest.outcome }}"  == "failure" ] && PASSED="false"
          [ "${{ steps.gitleaks.outcome }}"  == "failure" ] && PASSED="false"
          [ "${{ steps.semgrep.outcome }}"   == "failure" ] && PASSED="false"
          [ "${{ steps.trivy-fs.outcome }}"  == "failure" ] && PASSED="false"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"

          echo "## EZ Policy Check Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ----- | ------ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Forbidden Files | ${{ steps.forbidden-files.outcome == 'success' && '✅ Clean' || '❌ Found tracked sensitive files' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Helm Lint | ${{ steps.helm-lint.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| OPA Policies | ${{ steps.conftest.outcome == 'success' && '✅ Passed' || steps.conftest.outcome == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dockerfile Lint | ${{ steps.helm-lint.outcome == 'success' && '✅ Passed' || '⚠️ Warnings' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Secret Scan | ${{ steps.gitleaks.outcome == 'success' && '✅ Clean' || '❌ Secrets Detected' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Semgrep | ${{ steps.semgrep.outcome == 'success' && '✅ Passed' || '❌ Findings' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trivy FS/IaC | ${{ steps.trivy-fs.outcome == 'success' && '✅ Passed' || '❌ Findings' }} |" >> "$GITHUB_STEP_SUMMARY"
