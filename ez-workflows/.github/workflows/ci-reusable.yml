# ────────────────────────────────────────────────────────────────────────────────
# EZ Platform — Reusable CI Workflow
#
# Contract (inputs/outputs):
#   Inputs : service name, ECR repo, AWS region, image tag override (optional),
#            environment (auto-detected from branch), infra-repo (optional GitOps)
#   Outputs: image.repository, image.tag, image.uri, sbom-artifact name, env
#
# Steps:
#   1.  Checkout + setup runtime
#   2.  Compute image tag (env-shortsha format)
#   3.  Detect runtime and set up toolchain
#   4.  Install dependencies
#   5.  Run unit tests
#   6.  Set up Docker Buildx
#   7.  Build Docker image (no push yet)
#   8.  Generate SBOM (Syft)
#   9.  Scan image (Trivy)
#   10. Upload Trivy SARIF to GitHub Security
#   11. Authenticate to AWS via OIDC (no static keys)
#   12. Login to ECR
#   13. Push image to ECR
#   14. GitOps patch (yq) — only if infra-repo input is provided
#   15. Slack notification — only if SLACK_WEBHOOK_URL secret is set
#   16. Publish job summary
# ────────────────────────────────────────────────────────────────────────────────
name: EZ CI (Reusable)

on:
  workflow_call:
    inputs:
      service-name:
        description: "Name of the service (used for image labels)"
        required: true
        type: string
      ecr-repository:
        description: "ECR repository name (e.g. my-org/my-service)"
        required: true
        type: string
      aws-region:
        description: "AWS region where ECR lives"
        required: false
        type: string
        default: "us-east-1"
      aws-account-id:
        description: "AWS account ID for ECR registry URL"
        required: true
        type: string
      image-tag:
        description: "Override image tag (defaults to {env}-{short-sha})"
        required: false
        type: string
        default: ""
      dockerfile-path:
        description: "Path to Dockerfile"
        required: false
        type: string
        default: "Dockerfile"
      build-context:
        description: "Docker build context"
        required: false
        type: string
        default: "."
      test-command:
        description: "Command to run tests"
        required: false
        type: string
        default: "make test"
      scan-severity-threshold:
        description: "Trivy severity threshold (UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL)"
        required: false
        type: string
        default: "HIGH,CRITICAL"
      allow-production-sourcemaps:
        description: "Allow JavaScript source maps to ship in the built image"
        required: false
        type: boolean
        default: false
      iam-role-arn:
        description: "IAM role ARN to assume via OIDC for ECR push"
        required: true
        type: string
      environment:
        description: "Deployment environment (auto-detected from branch if not set)"
        required: false
        type: string
        default: ""
      infra-repo:
        description: "GitOps infra repo to patch after push (e.g. dvir-berko/infra)"
        required: false
        type: string
        default: ""
      infra-repo-ref:
        description: "Branch/ref of the infra repo to clone"
        required: false
        type: string
        default: "main"

    outputs:
      image-repository:
        description: "Full ECR image repository URI"
        value: ${{ jobs.ci.outputs.image-repository }}
      image-tag:
        description: "Image tag that was pushed"
        value: ${{ jobs.ci.outputs.image-tag }}
      image-uri:
        description: "Full image URI (repository:tag)"
        value: ${{ jobs.ci.outputs.image-uri }}
      sbom-artifact:
        description: "Name of the uploaded SBOM artifact"
        value: ${{ jobs.ci.outputs.sbom-artifact }}
      env:
        description: "Resolved deployment environment name"
        value: ${{ jobs.ci.outputs.env }}

    secrets:
      # No static secrets needed — OIDC is used for AWS auth.
      EXTRA_BUILD_ARGS:
        description: "Optional Docker --build-arg values (newline-separated)"
        required: false
      INFRA_REPO_PAT:
        description: "GitHub PAT with write access to the infra repo (for GitOps patch)"
        required: false
      SLACK_WEBHOOK_URL:
        description: "Slack incoming webhook URL for build notifications"
        required: false

jobs:
  ci:
    name: Build · Test · Scan · Push
    runs-on: ubuntu-latest
    permissions:
      contents: read          # checkout
      id-token: write         # OIDC → AWS
      packages: read          # optional: pull base images from GHCR
      security-events: write  # upload SARIF to GitHub Security tab

    outputs:
      image-repository: ${{ steps.meta.outputs.repository }}
      image-tag:        ${{ steps.meta.outputs.tag }}
      image-uri:        ${{ steps.meta.outputs.uri }}
      sbom-artifact:    sbom-${{ inputs.service-name }}-${{ steps.meta.outputs.tag }}
      env:              ${{ steps.meta.outputs.env }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Compute image tag (env-shortsha format) ──────────────────────────
      - name: Compute image metadata
        id: meta
        run: |
          REGISTRY="${{ inputs.aws-account-id }}.dkr.ecr.${{ inputs.aws-region }}.amazonaws.com"
          REPO="${{ inputs.ecr-repository }}"

          # Resolve environment: explicit input → branch mapping → sanitized branch name
          ENV="${{ inputs.environment }}"
          if [ -z "$ENV" ]; then
            BRANCH="${GITHUB_REF_NAME}"
            case "$BRANCH" in
              dev)     ENV="dev" ;;
              staging) ENV="staging" ;;
              main)    ENV="prod" ;;
              *)       ENV="$(echo "$BRANCH" | tr '/' '-' | tr '_' '-' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]//g' | cut -c1-20)" ;;
            esac
          fi

          TAG="${{ inputs.image-tag }}"
          if [ -z "$TAG" ]; then
            SHORT_SHA="${GITHUB_SHA::8}"
            TAG="${ENV}-${SHORT_SHA}"
          fi

          echo "registry=$REGISTRY"             >> "$GITHUB_OUTPUT"
          echo "repository=$REGISTRY/$REPO"     >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"                        >> "$GITHUB_OUTPUT"
          echo "uri=$REGISTRY/$REPO:$TAG"        >> "$GITHUB_OUTPUT"
          echo "env=$ENV"                        >> "$GITHUB_OUTPUT"

      # ── 3. Detect runtime and set up toolchain ──────────────────────────────
      - name: Set up Python (if pyproject.toml / requirements.txt exists)
        if: ${{ hashFiles('pyproject.toml', 'requirements*.txt') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node (if package.json exists)
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Go (if go.mod exists)
        if: ${{ hashFiles('go.mod') != '' }}
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # ── 4. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: |
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
          if [ -f "requirements-dev.txt" ]; then pip install -r requirements-dev.txt; fi
          if [ -f "package-lock.json" ]; then npm ci; fi
          if [ -f "go.mod" ]; then go mod download; fi

      # ── 5. Run tests ────────────────────────────────────────────────────────
      - name: Run tests
        run: ${{ inputs.test-command }}
        env:
          CI: "true"

      # ── 6. Set up Docker Buildx ─────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 7. Build image (no push yet) ────────────────────────────────────────
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.build-context }}
          file:    ${{ inputs.dockerfile-path }}
          load:    true   # load into local daemon for scan
          push:    false
          tags:    ${{ steps.meta.outputs.uri }}
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            ez.service=${{ inputs.service-name }}
            ez.environment=${{ steps.meta.outputs.env }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: ${{ secrets.EXTRA_BUILD_ARGS }}

      # ── 8. Generate SBOM (Syft) ─────────────────────────────────────────────
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image:            ${{ steps.meta.outputs.uri }}
          format:           spdx-json
          output-file:      sbom.spdx.json
          artifact-name:    sbom-${{ inputs.service-name }}-${{ steps.meta.outputs.tag }}
          upload-artifact:  true

      # ── 9. Scan image (Trivy) ───────────────────────────────────────────────
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        id: trivy
        with:
          image-ref:      ${{ steps.meta.outputs.uri }}
          format:         sarif
          output:         trivy-results.sarif
          severity:       ${{ inputs.scan-severity-threshold }}
          exit-code:      "1"
          ignore-unfixed: true

      # ── 10. Inspect built image filesystem ──────────────────────────────────
      - name: Inspect built image filesystem
        run: |
          set -euo pipefail

          CID="$(docker create "${{ steps.meta.outputs.uri }}" true)"
          trap 'docker rm -f "$CID" >/dev/null 2>&1 || true' EXIT

          docker export "$CID" | tar -tf - > /tmp/image-files.txt

          python3 - <<'PY'
          import pathlib
          import re
          import sys

          allow_sourcemaps = "${{ inputs.allow-production-sourcemaps }}".lower() == "true"
          files = pathlib.Path("/tmp/image-files.txt").read_text().splitlines()

          checks = [
              ("Committed env files", re.compile(r"(^|/)\.env([._-][^/]+)?$"), {
                  ".env.example",
                  ".env.template",
                  ".env.sample",
              }),
              ("Backup artifacts", re.compile(r"(^|/).+\.(bak|old|backup|dump|sql|tar|tgz|gz|zip)$"), set()),
              ("Open backup directories", re.compile(r"(^|/)(backup|backups|bak|old|dump)(/|$)"), set()),
          ]

          if not allow_sourcemaps:
              checks.append(("Production source maps", re.compile(r"(^|/).+\.map$"), set()))

          failures = []
          for label, pattern, allowlist in checks:
              matches = []
              for item in files:
                  normalized = item.lstrip("./")
                  basename = normalized.rsplit("/", 1)[-1]
                  if basename in allowlist:
                      continue
                  if pattern.search(normalized):
                      matches.append(normalized)
              if matches:
                  failures.append((label, matches[:20]))

          if failures:
              for label, matches in failures:
                  print(f"{label} detected in built image:")
                  for match in matches:
                      print(f"  - {match}")
              sys.exit(1)
          PY

      # ── 11. Upload Trivy SARIF to GitHub Security ───────────────────────────
      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      # ── 12. Authenticate to AWS via OIDC ────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        if: ${{ github.event_name != 'pull_request' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ inputs.iam-role-arn }}
          aws-region:        ${{ inputs.aws-region }}
          role-session-name: ez-ci-${{ inputs.service-name }}

      # ── 13. Login to ECR ────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        if: ${{ github.event_name != 'pull_request' }}
        uses: aws-actions/amazon-ecr-login@v2

      # ── 14. Push image to ECR ───────────────────────────────────────────────
      - name: Push image to ECR
        if: ${{ github.event_name != 'pull_request' }}
        run: docker push ${{ steps.meta.outputs.uri }}

      # ── 15. GitOps patch via yq ─────────────────────────────────────────────
      # Only runs when infra-repo input is provided (e.g. "dvir-berko/infra")
      - name: Patch infra repo image tag (GitOps)
        if: ${{ github.event_name != 'pull_request' && inputs.infra-repo != '' }}
        env:
          INFRA_REPO:     ${{ inputs.infra-repo }}
          INFRA_REF:      ${{ inputs.infra-repo-ref }}
          NEW_TAG:        ${{ steps.meta.outputs.tag }}
          ENV:            ${{ steps.meta.outputs.env }}
          GIT_AUTHOR_NAME:  "ez-platform[bot]"
          GIT_AUTHOR_EMAIL: "ez-platform[bot]@users.noreply.github.com"
          GH_PAT:         ${{ secrets.INFRA_REPO_PAT }}
        run: |
          # Install yq v4
          YQ_VERSION="v4.44.1"
          sudo wget -qO /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq

          # Clone infra repo using PAT
          git clone \
            "https://x-access-token:${GH_PAT}@github.com/${INFRA_REPO}.git" \
            /tmp/infra-repo
          cd /tmp/infra-repo
          git checkout "$INFRA_REF"

          # Patch envs/{env}/values.yaml
          VALUES_FILE="envs/${ENV}/values.yaml"
          if [ ! -f "$VALUES_FILE" ]; then
            echo "::error::Values file not found: $VALUES_FILE"
            exit 1
          fi
          yq -i ".image.tag = \"${NEW_TAG}\"" "$VALUES_FILE"

          # Commit and push
          git config user.name  "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git add "$VALUES_FILE"
          git commit -m "chore(cd): update ${{ inputs.service-name }} image tag to ${NEW_TAG} [skip ci]"
          git push origin "$INFRA_REF"

      # ── 16. Slack notification ──────────────────────────────────────────────
      # Runs always (success or failure) when SLACK_WEBHOOK_URL is set
      - name: Notify Slack
        if: ${{ always() && secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook:      ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} *${{ inputs.service-name }}* CI ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Service:*\n${{ inputs.service-name }}" },
                    { "type": "mrkdwn", "text": "*Environment:*\n${{ steps.meta.outputs.env }}" },
                    { "type": "mrkdwn", "text": "*Image Tag:*\n`${{ steps.meta.outputs.tag }}`" },
                    { "type": "mrkdwn", "text": "*Status:*\n${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }

      # ── 17. Publish job summary ─────────────────────────────────────────────
      - name: Publish CI summary
        if: always()
        run: |
          echo "## EZ CI Summary — ${{ inputs.service-name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ----- | ----- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image URI | \`${{ steps.meta.outputs.uri }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`${{ steps.meta.outputs.env }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit SHA | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SBOM | sbom-${{ inputs.service-name }}-${{ steps.meta.outputs.tag }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Scan Threshold | ${{ inputs.scan-severity-threshold }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image Push | ${{ github.event_name == 'pull_request' && 'Skipped on PRs' || 'Pushed to ECR' }} |" >> "$GITHUB_STEP_SUMMARY"
