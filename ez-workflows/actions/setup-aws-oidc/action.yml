# Composite action: Authenticate to AWS using OIDC
# No static AWS keys are required.
name: Setup AWS via OIDC
description: "Authenticates to AWS using GitHub OIDC and configures the AWS CLI"

inputs:
  role-arn:
    description: "IAM role ARN to assume"
    required: true
  aws-region:
    description: "AWS region"
    required: false
    default: "us-east-1"
  session-name:
    description: "Role session name"
    required: false
    default: "ez-github-actions"

outputs:
  aws-account-id:
    description: "AWS account ID of the assumed role"
    value: ${{ steps.identity.outputs.account-id }}

runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume:    ${{ inputs.role-arn }}
        aws-region:        ${{ inputs.aws-region }}
        role-session-name: ${{ inputs.session-name }}

    - name: Verify identity
      id: identity
      shell: bash
      run: |
        IDENTITY=$(aws sts get-caller-identity --output json)
        echo "account-id=$(echo $IDENTITY | jq -r .Account)" >> "$GITHUB_OUTPUT"
        echo "arn=$(echo $IDENTITY | jq -r .Arn)" >> "$GITHUB_OUTPUT"
        echo "::notice::Assumed role: $(echo $IDENTITY | jq -r .Arn)"
